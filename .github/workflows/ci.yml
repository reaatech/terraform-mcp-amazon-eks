name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run deployment/integration tests"
        required: false
        default: false
        type: boolean

env:
  TERRAFORM_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  OPA_VERSION: "0.68.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mcp-server

jobs:
  # ───────────────────────────────────────────────────────────────
  # STAGE 1 — Code Quality (parallel gates)
  # ───────────────────────────────────────────────────────────────

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format
        run: terraform fmt -recursive -check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --format compact

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate root module
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate submodules
        run: |
          set -euo pipefail
          for dir in modules/*; do
            echo "Validating $dir"
            (
              cd "$dir"
              terraform init -backend=false
              terraform validate
            )
          done

      - name: Validate environments
        run: |
          set -euo pipefail
          for dir in environments/*; do
            echo "Validating $dir"
            (
              cd "$dir"
              terraform init -backend=false -upgrade
              terraform validate
            )
          done

      - name: Validate examples
        run: |
          set -euo pipefail
          for dir in examples/*; do
            echo "Validating $dir"
            (
              cd "$dir"
              terraform init -backend=false -upgrade
              terraform validate
            )
          done

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          compact: true
          quiet: true

  # ───────────────────────────────────────────────────────────────
  # STAGE 2 — Tests & Docker (gated by Stage 1)
  # ───────────────────────────────────────────────────────────────

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Run Unit Tests
        working-directory: tests
        run: |
          go mod download
          go test -v -timeout 10m ./unit/...

  policy-tests:
    name: Policy Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: ${{ env.OPA_VERSION }}

      - name: Run Policy Tests
        run: opa test tests/policy -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration == true && secrets.AWS_ROLE_ARN != ''
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Run Integration Tests
        working-directory: tests
        env:
          RUN_AWS_INTEGRATION: "true"
        run: |
          go mod download
          go test -v -timeout 60m ./integration/...

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit, unit-tests, policy-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,suffix=,format=short

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
