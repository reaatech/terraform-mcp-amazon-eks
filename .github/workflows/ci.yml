name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run deployment/integration tests"
        required: false
        default: false
        type: boolean

env:
  TERRAFORM_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  OPA_VERSION: "0.70.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mcp-server

jobs:
  # ───────────────────────────────────────────────────────────────
  # STAGE 1 — Code Quality (parallel gates)
  # ───────────────────────────────────────────────────────────────

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Terraform Format
        run: terraform fmt -recursive -check -diff

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.55.1
      - run: tflint --init
      - run: tflint --recursive

  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - .
          - modules/eks
          - modules/elasticache
          - modules/iam
          - modules/keda
          - modules/mcp-service
          - modules/monitoring
          - modules/secrets
          - modules/sqs
          - environments/dev
          - environments/prod
          - examples/basic
          - examples/multi-service
          - examples/vpc-only
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - run: terraform -chdir=${{ matrix.dir }} init -backend=false
      - run: terraform -chdir=${{ matrix.dir }} validate

  audit:
    name: Security Audit (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          # Don't fail CI on audit-only findings; surface them in the UI instead.
          soft_fail: true

  # ───────────────────────────────────────────────────────────────
  # STAGE 2 — Tests & Docker (gated by Stage 1)
  # ───────────────────────────────────────────────────────────────

  check-aws:
    name: Check AWS Credentials
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
    steps:
      - id: check
        run: |
          if [ -n "$AWS_ROLE_ARN" ]; then
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Run Unit Tests
        working-directory: tests
        run: |
          go mod tidy
          go mod download
          go test -v -timeout 10m ./unit/...

  policy-tests:
    name: Policy Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2.3.0
        with:
          version: ${{ env.OPA_VERSION }}
      - run: opa test tests/policy -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit, check-aws]
    if: |
      needs.check-aws.outputs.has-secrets == 'true' &&
      (github.event_name == 'workflow_dispatch' && inputs.run_integration == true ||
       contains(github.event.pull_request.labels.*.name, 'integration'))
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2
      - name: Run Integration Tests
        working-directory: tests
        env:
          RUN_AWS_INTEGRATION: "true"
        run: |
          go mod tidy
          go mod download
          go test -v -timeout 60m ./integration/...

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit, unit-tests, policy-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,suffix=,format=short

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
