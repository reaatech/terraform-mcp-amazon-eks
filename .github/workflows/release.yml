name: Release

on:
  push:
    tags:
      - 'v*'

env:
  TERRAFORM_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  OPA_VERSION: "0.68.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mcp-server

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Terraform Format
        run: terraform fmt -recursive -check -diff

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.1
      - run: tflint --init
      - run: tflint --recursive

  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - .
          - modules/eks
          - modules/elasticache
          - modules/iam
          - modules/keda
          - modules/mcp-service
          - modules/monitoring
          - modules/secrets
          - modules/sqs
          - environments/dev
          - environments/prod
          - examples/basic
          - examples/multi-service
          - examples/vpc-only
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - run: terraform -chdir=${{ matrix.dir }} init -backend=false
      - run: terraform -chdir=${{ matrix.dir }} validate

  audit:
    name: Security Audit (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          version: 3.2.334
          soft_fail: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Run Unit Tests
        working-directory: tests
        run: |
          go mod download
          go test -v -timeout 10m ./unit/...

  policy-tests:
    name: Policy Tests
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: ${{ env.OPA_VERSION }}
      - run: opa test tests/policy -v

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit, unit-tests, policy-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [format, lint, validate, audit, unit-tests, policy-tests, docker-push]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Changes
            - See commit history for details

            ## Docker Image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ## Usage
            ```hcl
            module "mcp_eks" {
              source           = "github.com/reaatech/terraform-mcp-aws-eks?ref=${{ github.ref_name }}"
              cluster_name     = "my-cluster"
              mcp_server_image = "my-registry/my-mcp-server:latest"
            }
            ```
